<div class="mentor-card">
  <!-- ICON -->
  <div class="mentor-icon">
    ↗
  </div>
  <div class="row g-3 align-items-center">
    <!-- AVATAR -->
    <div class="col-12 col-md-3 text-center">
      <div class="mentor-avatar-wrapper">
        <img
          class="mentor-avatar"
          [src]="mentor?.avatar"
          alt="avatar"
        />
      </div>
    </div>

    <!-- INFO -->
    <div class="col-12 col-md-9">
      <div class="mentor-info">
        <h3 class="mentor-name">
          {{ mentor?.name }}
        </h3>
        <div class="mentor-email">
          {{ mentor?.email }}
        </div>
        <div class="mentor-role">
          Mentor
        </div>
        <!-- meta -->
        <div class="mentor-meta">
          <div *ngIf="mentor?.info?.education">
            Học vấn: {{ mentor?.info?.education }}
          </div>
          <div *ngIf="mentor?.info?.experience">
            Kinh nghiệm: {{ mentor?.info?.experience }}
          </div>
          <div *ngIf="mentor?.info?.position">
            Vị trí công tác: {{ mentor?.info?.position }}
          </div>
        </div>

        <!-- location -->
        <div *ngIf="mentor?.info?.location_name" class="mt-2">
            Khu vực: 
            <span class="location-tag">
                {{ mentor?.info?.location_name }}
            </span>
        </div>
      </div>
    </div>
  </div>
</div>
