            class="nav-item"

            [routerLinkActiveOptions]="{ exact: item.exact || false }"

            <a
              *ngIf="!item.children"
              class="fw-bold nav-link-item text-decoration-none"
              [routerLink]="item.link"
            >
              {{ item.label }}
            </a>

            <!-- Nếu có children -->
            <div
              *ngIf="item.children"
              class="fw-bold nav-link-item d-flex align-items-center position-relative"
            >
              <span>{{ item.label }}</span>
              <i class="fa-solid fa-caret-down nav-item__icon"></i>

              <ul class="sub-menu position-absolute">
                <li
                  *ngFor="let child of item.children"
                  class="sub-menu__item"
                  routerLinkActive="active"
                >
                  <a
                    class="sub-menu__link nav-link-item text-decoration-none"
                    [routerLink]="child.link"
                  >
                    {{ child.label }}
                  </a>
                </li>
              </ul>
            </div>
          </li>
        </ul>

  <div id="mySidepanel" class="sidepanel">
    <div class="p-3">
      <header class="d-flex justify-content-between align-items-center">
        <h2 class="sidepanel-title"><i class="primary-color fa-solid fs-5 fa-bookmark"></i> Nội dung được lưu</h2>
        <button (click)="closeSaveInfo(true)" class="btn-save-close">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </header>
      <ul class="sidepanel__nav-list my-3">
        <li class="sidepanel__nav-item contest active" (click)="getContestStatus($event)">
          <a class="sidepanel__nav-link">Cuộc Thi ({{ countPost || 0 }})</a>
        </li>
        <li class="sidepanel__nav-item post" (click)="getPostStatus($event)">
          <a [attr.disabled]="!statusPage" class="sidepanel__nav-link">Tuyển dụng ({{ countContest || 0 }})</a>
        </li>
      </ul>
      <div *ngIf="statusPage" class="sidepanel__nav-content">
        <div class="" *ngIf="typeTab == 0 && contests.length > 0">
          <app-contest-item
            *ngFor="let item of contests"
            [item]="item"
            (requestFavorite)="filterContest($event)"
            (contestRelated)="closeSaveInfo($event)"
          ></app-contest-item>
        </div>
        <div class="" *ngIf="typeTab == 1 && posts.length > 0">
          <app-recruitment-position *ngFor="let item of posts" [item]="item" (requestFavorite)="filterPost($event)">
          </app-recruitment-position>
        </div>
        <div
          *ngIf="(typeTab == 0 && contests.length == 0) || (typeTab == 1 && posts.length == 0)"
          class="d-flex justify-content-center align-items-center mt-5"
        >
          <img src="../../../assets/img/no-result.png" alt="No data" />
        </div>
      </div>
      <div *ngIf="!statusPage">
        <ngx-skeleton-loader
          [theme]="{
            'height.px': '200',
            'margin-bottom': '20'
          }"
          count="5"
          animation="pulse"
        ></ngx-skeleton-loader>
      </div>
    </div>
  </div>
</div>
<div (click)="closeSaveInfo(true)" class="overlay d-none"></div>

<!-- menu mobile -->
<div class="menu-mobile" [ngClass]="{ active: isOpenMenuMobile }">
  <!-- overlay -->
  <div class="menu-mobile__overlay" (click)="handleToggleMenuMobile(true)"></div>

  <!-- menu -->
  <div class="menu-response">

    <!-- header -->
    <div class="menu-header d-flex justify-content-between align-items-center">
      <span>Menu</span>
      <i class="fas fa-times" (click)="handleToggleMenuMobile(true)"></i>
    </div>

    <!-- menu list -->
    <ul class="menu-res">
      <li *ngFor="let item of menu" class="menu-res-item">

        <!-- item thường -->
        <a
          *ngIf="!item.children"
          (click)="handleToggleMenuMobile(false)"
          [routerLink]="item.link"
          routerLinkActive="active"
          class="menu-mobile__item-link"
        >
          {{ item.label }}
        </a>

        <!-- item có children -->
        <div *ngIf="item.children">

          <!-- parent -->
          <div
            class="menu-mobile__item-link parent"
            (click)="toggleMobileSubMenu(item)"
          >
            <span>{{ item.label }}</span>

            <i
              class="fa-solid fa-chevron-down"
              [ngClass]="{ rotate: openSubMenu === item }"
            ></i>
          </div>

          <!-- children -->
          <ul
            class="submenu"
            *ngIf="openSubMenu === item"
          >
            <li *ngFor="let child of item.children">
              <a
                (click)="handleToggleMenuMobile(false)"
                [routerLink]="child.link"
                routerLinkActive="active"
              >
                {{ child.label }}
              </a>
            </li>
          </ul>

        </div>

      </li>
    </ul>

  </div>
</div>
