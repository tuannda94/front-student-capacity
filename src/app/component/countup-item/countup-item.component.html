<div class="stats-container">
    <div class="stat-card" *ngFor="let stat of stats">
        <img
            *ngIf="stat.icon"
            class="stat-icon"
            [src]="stat.icon"
            [alt]="stat.name"
        />
        <div class="stat-number">
            <span [countUp]="stat.data[0].value" [duration]="2000"></span>+
        </div>
        <div class="stat-label">
            {{ stat.data[0].unit }}
        </div>
    </div>
</div>
