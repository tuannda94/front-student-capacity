<app-banner [page]="page"></app-banner>
<div>
  <div class="services-section">
    <h2 class="section-title">
      <i class="section__title-icon fa-solid fa-briefcase"></i>
      Dịch vụ việc làm
    </h2>

    <div class="services-grid">
      <!-- loading -->
      <ng-container *ngIf="isLoading">
        <div class="service-card" *ngFor="let item of [].constructor(6)">
          <div class="image-box">
            <ngx-skeleton-loader
              appearance="line"
              [theme]="{
                width: '100%',
                height: '250px',
                'border-radius': '6px'
              }">
            </ngx-skeleton-loader>
          </div>
    
          <ngx-skeleton-loader
            appearance="line"
            [theme]="{
              width: '70%',
              height: '20px',
              'margin-top': '15px'
            }">
          </ngx-skeleton-loader>
    
          <ngx-skeleton-loader
            appearance="line"
            [theme]="{
              width: '100%',
              height: '14px',
              'margin-top': '10px'
            }">
          </ngx-skeleton-loader>
    
          <ngx-skeleton-loader
            appearance="line"
            [theme]="{
              width: '90%',
              height: '14px',
              'margin-top': '6px'
            }">
          </ngx-skeleton-loader>
        </div>
      </ng-container>
      
      <!-- data -->
      <div *ngIf="!isLoading">
        <div *ngIf="services.length > 0">
          <div 
            class="service-card" 
            *ngFor="let service of services" 
            (click)="openModal(service)"
          >
            <div class="image-box">
              <img [src]="service.thumbnail" alt="">
            </div>
            <h3 class="service-title">
              {{ service?.name }}
            </h3>
            <p class="service-desc">
              {{ service?.description }}
            </p>
          </div>
        </div>
        <div *ngIf="services.length == 0">
          <h1 class="text-center">Không có dữ liệu</h1>
        </div>
      </div>
    </div>

    <!-- modal -->
    <div class="modal-overlay" *ngIf="selectedService" (click)="closeModal()">
      <div class="modal-box" (click)="$event.stopPropagation()">
        <div class="modal-header">
          <h2>{{ selectedService?.name }}</h2>
          <span class="close-btn" (click)="closeModal()">✕</span>
        </div>
        <div class="modal-body">
          <img [src]="selectedService.thumbnail" alt="">
          <p>{{ selectedService?.description }}</p>
        </div>
        <div class="modal-footer">
          <button class="my-btn my-btn-primary my-btn-xs" (click)="openUrl(selectedService?.link)">
            Đăng ký dịch vụ
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
